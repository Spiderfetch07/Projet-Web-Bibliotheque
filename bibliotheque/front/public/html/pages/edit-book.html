<div class="main-content form-page">
  <h1>Modifier un livre</h1>
  <hr>
  <div id="msg"></div>
  <input type="text" id="book-title" placeholder="Nom du livre" />
  <select id="book-author">
    <option value="">Nom d'un auteur</option>
  </select>
  <select id="book-status">
    <option value="available">En stock</option>
    <option value="borrowed">Emprunté</option>
  </select>
  <button class="btn" id="submit-btn">Valider les modifications</button>
</div>
